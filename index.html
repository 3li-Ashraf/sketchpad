<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sketchpad</title>
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon/favicon-16x16.png">
    <link rel="manifest" href="./favicon/site.webmanifest">
    <link rel="mask-icon" href="./favicon/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="./favicon/favicon.ico">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-config" content="./favicon/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap">
    <!-- HTML2Canvas library -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- Styles and Script files -->
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>

<body>
    <!-- Header -->
    <header>
        <h1 class="title">Sketchpad</h1>
    </header>
    <!-- Main -->
    <div class="main">
        <!-- Settings -->
        <div class="settings">
            <!-- Drawing Settings -->
            <div class="drawing-settings">
                <h2 class="settings-title">Drawing Settings</h2>
                <div class="pen-and-fill-color-container">
                    <input type="color" id="penAndFillColorPicker">
                    <span>Pen/Fill Color</span>
                </div>
                <div class="background-color-container">
                    <input type="color" value="#ffffff" id="backgroundColorPicker">
                    <span>Background Color</span>
                </div>
                <div class="pen-fill-eraser-container">
                    <button class="settings-button" id="penButton">Pen</button>
                    <button class="settings-button" id="eraserButton">Eraser</button>
                    <button class="settings-button" id="fillButton">Fill</button>
                </div>
                <div class="shade-lighten-colorful-container">
                    <button class="settings-button" id="shadingModeButton">Shade</button>
                    <button class="settings-button" id="lightenModeButton">Lighten</button>
                    <button class="settings-button" id="colorfulModeButton">Colorful</button>
                </div>
                <div class="undo-redo-container">
                    <button class="settings-button" id="undoButton">Undo</button>
                    <button class="settings-button" id="redoButton">Redo</button>
                </div>
            </div>
            <!-- Grid Settings -->
            <div class="grid-settings">
                <h2 class="settings-title">Grid Settings</h2>
                <p>Grid size: <span id="gridSize"></span></p>
                <input type="range" min="1" max="64" value="32" id="gridSizeSlider">
                <button class="settings-button" id="gridLinesButton">Grid Lines: <span id="gridLinesStatus"></span></button>
                <button class="settings-button" id="screenshotButton">Screenshot</button>
                <div class="save-load-container">
                    <button class="settings-button" id="saveButton">Save Grid</button>
                    <button class="settings-button" id="loadButton">Load Grid</button>
                    <input type="file" id="loadInput" style="display:none">
                </div>
                <button class="settings-button" id="clearButton">Clear</button>
            </div>
        </div>
        <!-- Main Center -->
        <div class="main-center">
            <div class="grid-container">
                <div id="grid"></div>
            </div>
        </div>
        <!-- Empty Div -->
        <div class="empty-div">
        </div>
    </div>
    <!-- Footer -->
    <footer>
        <p>Copyright &copy; <span id="currentYear"></span> by Ali Ashraf</p>
    </footer>
</body>

</html>
